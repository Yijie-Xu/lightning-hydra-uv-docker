name: lightning-hydra-uv-docker

x-app: &app
  image: ${IMAGE:-lightning-hydra-uv-docker}
  build:
    context: .
    dockerfile: Dockerfile

  working_dir: /app
  init: true
  shm_size: ${SHM_SIZE:-8g}

  ulimits:
    memlock: -1
    stack: 67108864

  env_file:
    - path: ./.env
      required: false

  environment:
    PROJECT_ROOT: /app
    PYTHONUNBUFFERED: "1"
    NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}

  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./src:/app/src
    - ./configs:/app/configs
    - ./scripts:/app/scripts
    - ./notebooks:/app/notebooks
    - uv-cache:/root/.cache/uv

  stdin_open: true
  tty: true
  command: bash

services:
  cpu:
    <<: *app

  gpu:
    <<: *app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  uv-cache:
